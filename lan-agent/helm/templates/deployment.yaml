apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lan-agent.fullname" . }}
  labels:
    {{- include "lan-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: lan-agent
    spec:
      containers:
        - name: lan-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: GATEWAY_URL
              value: {{ .Values.gateway.url | quote }}
            - name: AGENT_ID
              value: {{ .Values.agentId | quote }}
            - name: CERT_FILE
              value: /certs/{{ .Values.certs.certFile }}
            - name: KEY_FILE
              value: /certs/{{ .Values.certs.keyFile }}
            - name: CA_FILE
              value: /certs/{{ .Values.certs.caFile }}
            {{- range $name, $url := .Values.services }}
            - name: {{ printf "SERVICE_%s" $name | upper | replace "-" "_" }}
              value: {{ $url | quote }}
            {{- end }}
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: certs
          secret:
            secretName: {{ .Values.certs.existingSecret }}
