# -- Global settings
global: {}

# -- Docker image settings
image:
  repository: stavbensimchon/home-app
  pullPolicy: Always
  tag: "latest"

# -- Whether to deploy PostgreSQL as a dependency.
# Set false and fill externalDatabase when using your own Postgres.
postgresql:
  enabled: true
  auth:
    username: homeapp
    password: homeapp_dev
    database: homeapp
  primary:
    persistence:
      enabled: true
      size: 8Gi

# -- External Postgres config (used when postgresql.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  username: homeapp
  password: homeapp_dev
  database: homeapp

# -- Backend configuration
backend:
  replicaCount: 1
  port: 8000
  env:
    APP_NAME: "Home App"
    DEBUG: "true"
    AI_API_KEY: ""
    AI_MODEL: "deepseek-v4-flash-free"
    AI_BASE_URL: "https://opencode.ai/zen/v1"
  resources: {}
  #  limits:
  #    cpu: 500m
  #    memory: 512Mi
  #  requests:
  #    cpu: 250m
  #    memory: 256Mi

# -- Frontend configuration
frontend:
  replicaCount: 1
  port: 8080
  resources: {}
  #  limits:
  #    cpu: 200m
  #    memory: 128Mi
  #  requests:
  #    cpu: 100m
  #    memory: 64Mi

# -- Gateway API HTTPRoute configuration
httproute:
  hostname: home-app.example.com
  # -- Gateway ref (namespace/name)
  parentRef:
    namespace: ""
    name: ""
