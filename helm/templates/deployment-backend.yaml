apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "home-app.fullname" . }}-backend
  labels:
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: {{ include "home-app.backend.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: DATABASE_URL
              value: {{ include "home-app.databaseUrl" . | quote }}
            - name: APP_NAME
              value: {{ .Values.backend.env.APP_NAME | quote }}
            - name: DEBUG
              value: {{ .Values.backend.env.DEBUG | quote }}
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.api_secret_name }}
                  key: AI_API_KEY
            - name: AI_MODEL
              value: {{ .Values.backend.env.AI_MODEL | quote }}
            - name: AI_BASE_URL
              value: {{ .Values.backend.env.AI_BASE_URL | quote }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
