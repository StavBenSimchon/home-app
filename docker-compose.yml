services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homeapp -d homeapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://homeapp:homeapp_dev@db:5432/homeapp
      AI_MODEL: ${AI_MODEL}
      AI_BASE_URL: ${AI_BASE_URL}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

volumes:
  pgdata:
