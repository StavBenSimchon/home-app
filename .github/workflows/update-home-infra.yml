name: Update Home Infra

on:
  push:
    branches: [main]
    paths:
      - "helm/**"
      - "backend/**"
      - "frontend/**"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout home-app
        uses: actions/checkout@v4
        with:
          path: home-app

      - name: Extract chart version
        id: chart
        run: |
          version=$(yq '.version' home-app/helm/Chart.yaml)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Determine image tag
        id: image
        run: |
          echo "tag=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Checkout home-infra
        uses: actions/checkout@v4
        with:
          repository: StavBenSimchon/home-infra
          token: ${{ secrets.GH_PAT }}
          path: home-infra

      - name: Update chart version in Application
        run: |
          yq -i '.spec.sources[0].targetRevision = "${{ steps.chart.outputs.version }}"' \
            home-infra/environments/live/applications/home-app.yaml

      - name: Update image tag in values
        run: |
          yq -i '.image.tag = "${{ steps.image.outputs.tag }}"' \
            home-infra/environments/live/values/home-app-values.yaml

      - name: Commit and push
        run: |
          cd home-infra
          git config user.name "Home App Bot"
          git config user.email "bot@home-app.bubblerock.org"
          git add .
          git diff --cached --quiet || git commit \
            -m "chore: update home-app to chart v${{ steps.chart.outputs.version }}, image ${{ steps.image.outputs.tag }}"
          git push