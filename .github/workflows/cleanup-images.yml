name: Cleanup Container Images

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Comma-separated package names (e.g. home-app/backend,home-app/frontend)"
        required: true
        default: "home-app/backend,home-app/frontend"
      keep:
        description: "Number of non-versioned images to keep"
        required: false
        default: "3"

permissions:
  contents: read
  packages: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old container images
        run: |
          # Install jq if not present
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          IFS=',' read -ra PACKAGES <<< "${{ github.event.inputs.packages }}"

          for PKG in "${PACKAGES[@]}"; do
            PKG="$(echo "$PKG" | xargs)"
            echo "=== $PKG ==="
            ENCODED="$(echo "$PKG" | sed 's|/|%2F|g')"

            echo "  Fetching versions for $PKG"
            API_URL="https://api.github.com/users/${{ github.repository_owner }}/packages/container/$ENCODED/versions"
            RESPONSE_FILE="/tmp/gh_response.json"

            # First request to get the versions with proper pagination
            curl -s -f -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.v3+json" "$API_URL" > "$RESPONSE_FILE"
            if [[ $? -ne 0 ]]; then
              echo "  Failed to fetch versions from $API_URL"
              echo "  Response file content:"
              cat "$RESPONSE_FILE"
              continue
            fi

            # Check if we got any data
            if [[ ! -s "$RESPONSE_FILE" ]]; then
              echo "  No versions found"
              continue
            fi

            echo "  Got response, processing versions..."
            RESPONSE="$(cat $RESPONSE_FILE)"

            # Parse and save to versions file
            echo "$RESPONSE" | jq -c '.[] | {id, tags: .metadata.container.tags, created_at}' > /tmp/versions.json

            if [[ $? -ne 0 ]]; then
              echo "  Error parsing versions. Raw response:"
              echo "$RESPONSE" | head -100
              continue
            fi

            KEEP_IDS=()
            DELETE_IDS=()
            TEMP_NONVER="/tmp/nonver.json"

            echo "  Processing versions..."
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              ID="$(echo "$line" | jq -r '.id')"
              TAGS="$(echo "$line" | jq -r '.tags | if length == 0 then empty else join(",") end')"

              if [ -z "$TAGS" ]; then
                DELETE_IDS+=("$ID")
                echo "    Untagged version will be deleted: $ID"
              elif echo "$TAGS" | tr ',' '\n' | grep -qE '^v'; then
                KEEP_IDS+=("$ID")
                echo "    Versioned (v*) will be kept: $ID"
              else
                echo "$line" >> "$TEMP_NONVER"
              fi
            done < /tmp/versions.json

            if [ -f "$TEMP_NONVER" ]; then
              jq -s 'sort_by(.created_at) | reverse | .[]' "$TEMP_NONVER" > /tmp/sorted.json
              COUNT=0
              while IFS= read -r line; do
                ID="$(echo "$line" | jq -r '.id')"
                if [ $COUNT -lt ${{ github.event.inputs.keep || 3 }} ]; then
                  KEEP_IDS+=("$ID")
                else
                  DELETE_IDS+=("$ID")
                fi
                COUNT=$((COUNT + 1))
              done < /tmp/sorted.json
            fi

            echo "  Keeping: ${#KEEP_IDS[@]} images"
            echo "  Deleting: ${#DELETE_IDS[@]} images"

            for ID in "${DELETE_IDS[@]}"; do
              echo "    Deleting version $ID"
              if curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$ENCODED/versions/$ID"; then
                echo "    Successfully deleted version $ID"
              else
                echo "    Failed to delete $ID"
              fi
            done

            echo ""
          done