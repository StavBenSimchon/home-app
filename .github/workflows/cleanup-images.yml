name: Cleanup Container Images

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Comma-separated package names"
        required: true
        default: "home-app/backend,home-app/frontend"
      keep:
        description: "Number of non-release images to keep"
        required: false
        default: "3"

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Cleanup old GHCR images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          KEEP: ${{ github.event.inputs.keep || '3' }}
          PACKAGES: ${{ github.event.inputs.packages || 'home-app/backend,home-app/frontend' }}
        run: |
          set -euo pipefail

          IFS=',' read -ra PKGS <<< "$PACKAGES"

          for PKG in "${PKGS[@]}"; do
            PKG=$(echo "$PKG" | xargs)
            ENCODED=$(echo "$PKG" | sed 's/\//%2F/g')

            echo "Processing $PKG"

            # Try org endpoint first, then user
            URL="https://api.github.com/orgs/$OWNER/packages/container/$ENCODED/versions?per_page=100"
            STATUS=$(curl -s -o versions.json -w "%{http_code}" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$URL")

            if [ "$STATUS" != "200" ]; then
              URL="https://api.github.com/users/$OWNER/packages/container/$ENCODED/versions?per_page=100"
              STATUS=$(curl -s -o versions.json -w "%{http_code}" \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "$URL")
            fi

            if [ "$STATUS" != "200" ]; then
              echo "Failed to fetch versions ($STATUS)"
              cat versions.json
              continue
            fi

            DELETE_IDS=$(
              jq -r --argjson keep "$KEEP" '
                map(
                  . + {
                    release: (
                      (.metadata.container.tags // [])
                      | any(test("^v"))
                    )
                  }
                )
                | map(select(.release == false))
                | sort_by(.created_at)
                | reverse
                | .[$keep:]
                | .[].id
              ' versions.json
            )

            if [ -z "$DELETE_IDS" ]; then
              echo "Nothing to delete."
              continue
            fi

            for ID in $DELETE_IDS; do
              echo "Deleting version $ID"

              curl -s -X DELETE \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "${URL%/versions*}/versions/$ID"

              echo
            done
          done