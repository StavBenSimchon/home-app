name: Cleanup Container Images

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Comma-separated package names (e.g. home-app/backend,home-app/frontend)"
        required: true
        default: "home-app/backend,home-app/frontend"
      keep:
        description: "Number of non-versioned images to keep"
        required: false
        default: "3"

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old container images
        run: |
          # Install jq if not present
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq > /dev/null
          fi

          echo "Starting cleanup for GitHub Packages container images..."
          echo "Repository: github.com/stavbensimchon/home-app"
          echo "Owner: ${{ github.repository_owner }}"

          IFS=',' read -ra PACKAGES <<< "${{ github.event.inputs.packages }}"
          KEEP="${{ github.event.inputs.keep || 3 }}"

          total_kept=0
          total_deleted=0

          for PKG in "${PACKAGES[@]}"; do
            PKG="$(echo "$PKG" | xargs)"
            echo "\n=== Processing package: $PKG ==="
            ENCODED="$(echo "$PKG" | sed 's|/|%2F|g')"

            echo "  Fetching versions from GitHub API..."
            
            # Use curl to get the versions
            if ! curl -s -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$ENCODED/versions?per_page=100" \
                > /tmp/versions.json; then
              echo "  ERROR: Failed to fetch versions"
              echo "  Response preview:"
              cat /tmp/versions.json | head -20 2>/dev/null || echo "  No response data"
              continue
            fi

            # Check if the response is empty
            if [[ ! -s /tmp/versions.json ]]; then
              echo "  WARNING: Empty response. Package may not exist or you don't have permission."
              continue
            fi

            # Check if response is JSON (not HTML)
            if head -n 1 /tmp/versions.json | grep -qi "<!doctype html>"; then
              echo "  ERROR: API returned HTML (likely not JSON)"
              echo "  Response preview:"
              head -c 500 /tmp/versions.json
              continue
            fi

            echo "  Parsing JSON response..."
            
            # Use jq to extract the needed fields
            jq -c '.[] | {id, tags: .metadata.container.tags, created_at}' /tmp/versions.json > /tmp/versions_parsed.json 2>/dev/null
            
            if [[ $? -ne 0 ]]; then
              echo "  ERROR: Failed to parse JSON with jq"
              echo "  Sample of response:"
              head -c 500 /tmp/versions.json
              continue
            fi

            TOTAL_VERSIONS=$(wc -l < /tmp/versions_parsed.json 2>/dev/null || echo 0)
            echo "  Total versions found: $TOTAL_VERSIONS"

            KEEP_IDS=()
            DELETE_IDS=()
            TEMP_NONVER="/tmp/nonver.json"

            echo "  Processing versions..."
            while IFS= read -r line; do
              [ -z "$line" ] && continue

              ID="$(echo "$line" | jq -r '.id')"
              TAGS="$(echo "$line" | jq -r '.tags | if length == 0 then empty else join(",") end')"

              if [ -z "$TAGS" ]; then
                DELETE_IDS+=("$ID")
                echo "    Untagged version will be deleted: $ID"
              elif echo "$TAGS" | tr ',' '\n' | grep -qE '^v'; then
                KEEP_IDS+=("$ID")
                echo "    Versioned (v*) will be kept: $ID"
              else
                echo "$line" >> "$TEMP_NONVER"
              fi
            done < /tmp/versions_parsed.json

            if [ -f "$TEMP_NONVER" ]; then
              jq -s 'sort_by(.created_at) | reverse | .[]' "$TEMP_NONVER" > /tmp/sorted.json
              COUNT=0
              while IFS= read -r line; do
                ID="$(echo "$line" | jq -r '.id')"
                if [ $COUNT -lt $KEEP ]; then
                  KEEP_IDS+=("$ID")
                else
                  DELETE_IDS+=("$ID")
                fi
                COUNT=$((COUNT + 1))
              done < /tmp/sorted.json
            fi

            echo "  Versions to keep: ${#KEEP_IDS[@]}"
            echo "  Versions to delete: ${#DELETE_IDS[@]}"

            for ID in "${DELETE_IDS[@]}"; do
              echo "    Deleting version $ID"
              if curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                   -H "Accept: application/vnd.github.v3+json" \
                   "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$ENCODED/versions/$ID"; then
                echo "    ✓ Successfully deleted version $ID"
                total_deleted=$((total_deleted + 1))
              else
                echo "    ✗ Failed to delete version $ID"
              fi
            done

            total_kept=$((total_kept + ${#KEEP_IDS[@]}))
          done

          echo "\n=== Summary ==="
          echo "Total versions kept: $total_kept"
          echo "Total versions deleted: $total_deleted"